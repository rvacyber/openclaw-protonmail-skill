name: Bug Report
description: Report a bug or issue with the ProtonMail skill
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the information below.
        
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what the bug is
      placeholder: When I try to...
    validations:
      required: true
      
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Configure skill with...
        2. Run command...
        3. See error...
    validations:
      required: true
      
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
      
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
      
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Please provide details about your setup
      value: |
        - OS: [e.g., macOS 14.5, Ubuntu 24.04]
        - Node.js version: [run `node --version`]
        - OpenClaw version: [run `openclaw --version`]
        - Bridge version: [e.g., 3.22.0]
        - Skill version: [e.g., 0.1.0]
    validations:
      required: true
      
  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Messages
      description: Paste any relevant error messages or logs
      render: shell
      
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have checked existing issues and this is not a duplicate
          required: true
        - label: I have included all requested information above
          required: true
        - label: I have removed any sensitive information from logs
          required: true
